# Nginx Configuration Template for PDG
# Place in: /etc/nginx/sites-available/dosegraph
# Enable with: sudo ln -s /etc/nginx/sites-available/dosegraph /etc/nginx/sites-enabled/

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dosegraph.com www.dosegraph.com api.dosegraph.com;
    
    # Allow certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Main domain and www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dosegraph.com www.dosegraph.com;

    # SSL Certificates (replace with your domain)
    ssl_certificate /etc/letsencrypt/live/dosegraph.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dosegraph.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dosegraph.com/chain.pem;

    # Modern TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP (Content Security Policy) - Adjust as needed
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.dosegraph.com" always;

    # Root and index
    root /home/appuser/percentdosegraph/deploy;
    index index.html;

    # GZIP Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header ETag "";
        if_modified_since off;
    }

    # HTML files (don't cache)
    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # React SPA Routing: Try file, directory, or fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://localhost:3001/api/health;
    }

    # API routes: Proxy to Node backend
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/dosegraph_access.log combined;
    error_log /var/log/nginx/dosegraph_error.log warn;
}

# HTTPS - API Subdomain (optional separate endpoint)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dosegraph.com;

    ssl_certificate /etc/letsencrypt/live/dosegraph.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dosegraph.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Access-Control-Allow-Origin "*" always;

    # Proxy all requests to Node backend
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    access_log /var/log/nginx/dosegraph_api_access.log combined;
    error_log /var/log/nginx/dosegraph_api_error.log warn;
}
