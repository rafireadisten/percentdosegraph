<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Clinical dosing visualization tool for pharmacists and clinicians"
    />
    <meta name="theme-color" content="#0d8f78" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <title>Simple MedGraphF React Account</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- Preload critical resources -->
    <link rel="preload" href="./app.bundle.js" as="script" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Loading indicator for PWA -->
    <div
      id="loading"
      style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%)"
    >
      <div>Loading Simple MedGraphF...</div>
    </div>

    <script type="module" src="./app.bundle.js"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('./sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }

      // PWA install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install button or banner
        console.log('PWA install prompt available');
      });
    </script>
  </body>
</html>
